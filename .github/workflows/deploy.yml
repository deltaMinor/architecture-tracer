name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby for Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: docs

      - name: Build Jekyll site
        run: bundle exec jekyll build
        working-directory: docs
        env:
          JEKYLL_ENV: production

      - name: Build ReactFlow app into docs/app
        run: npx vite build --outDir docs/app
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/app/

      - name: Upload page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Debug site output
        run: |
          echo "==> Contents of docs/_site/:"
          ls -la docs/_site/
          echo "==> Contents of docs/_site/app/:"
          ls -la docs/_site/app/ || echo "app/ folder missing from _site"
          echo "==> Head of docs/_site/app/index.html:"
          head -20 docs/_site/app/index.html || echo "index.html missing"
          echo "==> docs/_site/app contents:"
          ls -la docs/_site/app/ || echo "WARNING: app/ missing from _site"
          echo "==> index.html asset paths:"
          head -30 docs/_site/app/index.html || echo "WARNING: app/index.html missing"

      